<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbound | CRM</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/crm.css">
    <style>
        /* Inbound-specific styles (light theme, matches CRM) */
        .ib-page { padding: 24px 32px; max-width: 1300px; margin: 0 auto; }
        .ib-page-header { margin-bottom: 20px; }
        .ib-page-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .ib-page-header p { color: var(--color-text-muted); font-size: 14px; }
        .ib-filter-bar { display: flex; gap: 12px; align-items: end; background: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; flex-wrap: wrap; }
        .ib-filter-bar > div { flex: 0 0 auto; }
        .ib-filter-bar label { display: block; font-size: 11px; color: var(--color-text-muted); margin: 0 0 6px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .ib-filter-bar select { background: var(--color-card); color: var(--color-text); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 8px 12px; font: inherit; font-size: 14px; }
        .ib-stats { display: flex; gap: 20px; margin-left: auto; align-items: center; font-size: 13px; color: var(--color-text-muted); }
        .ib-stat-num { color: var(--color-text); font-weight: 700; font-size: 18px; margin-right: 4px; }
        .ib-card { background: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow-sm); }
        .ib-card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
        .ib-card-name { font-size: 16px; font-weight: 700; color: var(--color-text); }
        .ib-card-meta { font-size: 12px; color: var(--color-text-muted); margin-top: 2px; }
        .ib-card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .ib-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
        .ib-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .ib-badge.brand-marcos { background: #ede9fe; color: #5b21b6; }
        .ib-badge.brand-vytalmed { background: #dbeafe; color: #1e3a8a; }
        .ib-badge.source { background: #f1f5f9; color: var(--color-text-muted); }
        .ib-badge.spark { background: #fef3c7; color: #92400e; }
        .ib-badge.intent-low { background: #fee2e2; color: #991b1b; }
        .ib-badge.intent-med { background: #fef3c7; color: #92400e; }
        .ib-badge.intent-high { background: #d1fae5; color: #065f46; }
        .ib-badge.segment { background: #e0e7ff; color: #3730a3; text-transform: capitalize; }
        .ib-badge.sent { background: #d1fae5; color: #065f46; }
        .ib-problem { background: #f8fafc; border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 10px 12px; font-size: 13px; color: var(--color-text); line-height: 1.5; margin-top: 8px; }
        .ib-brief { background: #fef9c3; border: 1px solid #fde68a; border-radius: var(--radius-md); padding: 10px 12px; font-size: 13px; margin-top: 8px; color: #713f12; }
        .ib-brief strong { color: #78350f; }
        .ib-triage { background: #f8fafc; border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 14px; margin-top: 12px; }
        .ib-triage-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
        .ib-reasoning { font-size: 13px; color: var(--color-text-muted); font-style: italic; margin-bottom: 12px; }
        .ib-draft-label { font-size: 11px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 8px 0 4px; font-weight: 600; }
        .ib-draft-input, .ib-draft-textarea { width: 100%; background: white; color: var(--color-text); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 8px 10px; font: inherit; font-size: 13px; }
        .ib-draft-textarea { min-height: 140px; resize: vertical; line-height: 1.5; font-family: ui-monospace, SFMono-Regular, monospace; }
        .ib-empty { text-align: center; padding: 60px 20px; color: var(--color-text-light); }
        .ib-err { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: var(--radius-md); font-size: 13px; margin: 12px 0; }
        .ib-meta-line { font-size: 11px; color: var(--color-text-light); }
    </style>
</head>
<body>
    <div id="app" class="app" style="display:none;">
        <header class="header">
            <div class="header-left">
                <h1 class="logo">CRM</h1>
            </div>
            <nav class="header-nav">
                <a href="/crm/#/" class="nav-link">Today</a>
                <a href="/crm/inbound.html" class="nav-link active" data-admin-only>📥 Inbound</a>
                <a href="/crm/#/contacts" class="nav-link">All Contacts</a>
                <a href="/crm/#/activity-log" class="nav-link">📋 Activity Log</a>
                <a href="/crm/#/spark" class="nav-link" data-admin-only>⚡ Spark</a>
                <a href="/crm/episodes.html" class="nav-link" data-admin-only>🎬 Episodes</a>
                <a href="/crm/#/blog" class="nav-link" data-admin-only>✍️ Blog</a>
            </nav>
            <div class="header-right">
                <button id="logoutBtn" class="btn btn-ghost btn-sm">Logout</button>
            </div>
        </header>

        <main class="main-content">
            <div class="ib-page">
                <div class="ib-page-header">
                    <h1>📥 Inbound Triage</h1>
                    <p>Recent contacts. Click <strong>Triage Now</strong> to classify and draft a reply.</p>
                </div>

                <div class="ib-filter-bar">
                    <div>
                        <label>Brand</label>
                        <select id="filter-brand">
                            <option value="">All</option>
                            <option value="marcos">Marcos</option>
                            <option value="vytalmed">VytalMed</option>
                        </select>
                    </div>
                    <div>
                        <label>Status</label>
                        <select id="filter-status">
                            <option value="untriaged">Untriaged only</option>
                            <option value="all">All recent</option>
                            <option value="triaged">Triaged only</option>
                        </select>
                    </div>
                    <div>
                        <label>Limit</label>
                        <select id="filter-limit">
                            <option>20</option>
                            <option>50</option>
                            <option>100</option>
                        </select>
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="loadQueue()">Refresh</button>
                    <div class="ib-stats">
                        <div><span class="ib-stat-num" id="stat-total">—</span>shown</div>
                        <div><span class="ib-stat-num" id="stat-untriaged">—</span>untriaged</div>
                        <div><span class="ib-stat-num" id="stat-hot">—</span>hot (≥7)</div>
                    </div>
                </div>

                <div id="error" class="ib-err" style="display:none"></div>
                <div id="queue"></div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>

    <script>
    if (!window.crmAuth.isLoggedIn()) {
        window.location.replace('/crm/');
    } else {
        document.getElementById('app').style.display = '';
        document.getElementById('logoutBtn').addEventListener('click', () => {
            window.crmAuth.logout();
            window.location.replace('/crm/');
        });
        if (!window.crmAuth.isAdmin()) {
            document.querySelectorAll('[data-admin-only]').forEach(el => el.style.display = 'none');
        }
    }

    const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.CRM_CONFIG;
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let queue = [];

    document.getElementById('filter-brand').addEventListener('change', loadQueue);
    document.getElementById('filter-status').addEventListener('change', loadQueue);
    document.getElementById('filter-limit').addEventListener('change', loadQueue);

    async function loadQueue() {
        setError('');
        const brand = document.getElementById('filter-brand').value;
        const status = document.getElementById('filter-status').value;
        const limit = parseInt(document.getElementById('filter-limit').value, 10);

        let q = sb.from('contacts_inbound').select('*').order('created_at', { ascending: false }).limit(limit);
        if (brand) q = q.eq('brand_slug', brand);
        if (status === 'untriaged') q = q.is('triage_id', null);
        if (status === 'triaged') q = q.not('triage_id', 'is', null);

        const { data, error } = await q;
        if (error) { setError(`Load failed: ${error.message}`); document.getElementById('queue').innerHTML = ''; return; }
        queue = data || [];
        render();
    }

    function render() {
        const container = document.getElementById('queue');
        if (queue.length === 0) {
            container.innerHTML = `<div class="ib-empty">No contacts match these filters.</div>`;
            ['stat-total','stat-untriaged','stat-hot'].forEach(id => document.getElementById(id).textContent = '0');
            return;
        }
        document.getElementById('stat-total').textContent = queue.length;
        document.getElementById('stat-untriaged').textContent = queue.filter(c => !c.triage_id).length;
        document.getElementById('stat-hot').textContent = queue.filter(c => (c.triage_intent_score || 0) >= 7).length;
        container.innerHTML = queue.map(renderCard).join('');
    }

    function renderCard(c) {
        const fullName = [c.first_name, c.last_name].filter(Boolean).join(' ') || '(no name)';
        const brand = c.brand_slug || 'marcos';
        const sparkInfo = c.brief_id ? `
            <div class="ib-brief">
                <strong>Spark Brief:</strong> ${escapeHtml(c.brief_problem || '(no problem)')}
                <div style="margin-top:4px;">
                    <strong>Level:</strong> ${escapeHtml(c.brief_solution_level || '?')}
                    · <strong>${c.brief_hours_per_week || '?'}</strong> hrs/wk
                    · <strong>${c.brief_people_involved || '?'}</strong> people
                </div>
            </div>
        ` : '';

        const triage = c.triage_id ? renderTriage(c) : `<div class="ib-meta-line" style="margin-top:8px;">Not triaged yet.</div>`;
        const triageButtonLabel = c.triage_id ? 'Re-Triage' : 'Triage Now';

        return `
            <div class="ib-card" id="card-${c.id}">
                <div class="ib-card-header">
                    <div>
                        <div class="ib-card-name">${escapeHtml(fullName)} ${c.company_name ? `· <span style="color:var(--color-text-muted); font-weight:400;">${escapeHtml(c.company_name)}</span>` : ''}</div>
                        <div class="ib-card-meta">
                            ${escapeHtml(c.email || '(no email)')}
                            ${c.job_title ? ` · ${escapeHtml(c.job_title)}` : ''}
                            ${c.created_at ? ` · ${new Date(c.created_at).toLocaleDateString()}` : ''}
                        </div>
                        <div class="ib-badges">
                            <span class="ib-badge brand-${brand}">${brand}</span>
                            ${c.source ? `<span class="ib-badge source">${escapeHtml(c.source)}</span>` : ''}
                            ${c.brief_id ? `<span class="ib-badge spark">Spark</span>` : ''}
                            ${c.triage_segment ? `<span class="ib-badge segment">${escapeHtml(c.triage_segment)}</span>` : ''}
                            ${c.triage_intent_score ? renderIntentBadge(c.triage_intent_score) : ''}
                        </div>
                    </div>
                    <div class="ib-card-actions">
                        <button class="btn btn-primary btn-sm" onclick="runTriage('${c.id}')" id="btn-triage-${c.id}">${triageButtonLabel}</button>
                    </div>
                </div>
                ${c.problem ? `<div class="ib-problem"><strong>Problem:</strong> ${escapeHtml(c.problem)}</div>` : ''}
                ${sparkInfo}
                <div id="triage-${c.id}">${triage}</div>
            </div>
        `;
    }

    function renderIntentBadge(score) {
        let cls = 'intent-low';
        if (score >= 7) cls = 'intent-high';
        else if (score >= 4) cls = 'intent-med';
        return `<span class="ib-badge ${cls}">Intent ${score}/10</span>`;
    }

    function renderTriage(c) {
        const sentBadge = c.triage_sent ? `<span class="ib-badge sent">Sent ${new Date(c.triage_sent_at).toLocaleDateString()}</span>` : '';
        return `
            <div class="ib-triage">
                <div class="ib-triage-row">
                    <span class="ib-badge segment">${escapeHtml(c.triage_segment || '?')}</span>
                    ${renderIntentBadge(c.triage_intent_score || 0)}
                    ${sentBadge}
                    <div class="ib-meta-line">${c.triage_created_at ? `Triaged ${new Date(c.triage_created_at).toLocaleString()}` : ''}</div>
                </div>
                <div class="ib-reasoning">${escapeHtml(c.triage_intent_reasoning || '')}</div>
                <div>
                    <div class="ib-draft-label">Subject</div>
                    <input type="text" class="ib-draft-input" id="subj-${c.id}" value="${escapeHtmlAttr(c.triage_draft_subject || '')}">
                    <div class="ib-draft-label">Body</div>
                    <textarea class="ib-draft-textarea" id="body-${c.id}">${escapeHtml(c.triage_draft_body || '')}</textarea>
                    <div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;">
                        <button class="btn btn-ghost btn-sm" onclick="copyEmail('${c.id}')">Copy email</button>
                        <button class="btn btn-ghost btn-sm" onclick="copyField('${c.id}', 'body')">Copy body only</button>
                        ${c.triage_sent ? '' : `<button class="btn btn-success btn-sm" onclick="markSent('${c.triage_id}', '${c.id}')">Mark as Sent</button>`}
                    </div>
                </div>
            </div>
        `;
    }

    async function runTriage(contactId) {
        const c = queue.find(x => x.id === contactId);
        if (!c) return;
        const btn = document.getElementById(`btn-triage-${contactId}`);
        btn.disabled = true; btn.textContent = 'Triaging...';
        setError('');

        const payload = {
            brand: c.brand_slug || 'marcos',
            contact: {
                first_name: c.first_name, last_name: c.last_name, email: c.email,
                job_title: c.job_title, company_name: c.company_name,
                company_industry: c.company_industry, company_size: c.company_size,
                source: c.source, problem: c.problem, notes: c.notes
            }
        };
        if (c.brief_id) {
            payload.spark_brief = {
                problem_clean: c.brief_problem,
                solution_level: c.brief_solution_level,
                suggested_approach: c.brief_approach,
                hours_per_week: c.brief_hours_per_week,
                people_involved: c.brief_people_involved
            };
        }

        try {
            const res = await fetch('/api/agents/inbound-triage', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const data = await res.json();
            if (!res.ok || !data.success) throw new Error(data.error || 'Triage failed');

            const { data: saved, error: saveErr } = await sb.from('contact_triage').insert([{
                contact_id: contactId,
                brand_slug: c.brand_slug || 'marcos',
                segment: data.segment,
                intent_score: data.intent_score,
                intent_reasoning: data.intent_reasoning,
                draft_subject: data.draft_subject,
                draft_body: data.draft_body,
                model: data.model,
                used_spark_brief: data.used_spark_brief
            }]).select().single();
            if (saveErr) throw new Error(`Save failed: ${saveErr.message}`);

            Object.assign(c, {
                triage_id: saved.id,
                triage_segment: saved.segment,
                triage_intent_score: saved.intent_score,
                triage_intent_reasoning: saved.intent_reasoning,
                triage_draft_subject: saved.draft_subject,
                triage_draft_body: saved.draft_body,
                triage_sent: false,
                triage_sent_at: null,
                triage_created_at: saved.created_at
            });

            if (saved.intent_score >= 8) {
                await sb.from('contacts').update({ high_intent: true }).eq('id', contactId);
            }

            render();
        } catch (e) {
            setError(`Triage failed: ${e.message}`);
            btn.disabled = false; btn.textContent = c.triage_id ? 'Re-Triage' : 'Triage Now';
        }
    }

    async function markSent(triageId, contactId) {
        const c = queue.find(x => x.id === contactId);
        if (!c) return;
        const subjEl = document.getElementById(`subj-${contactId}`);
        const bodyEl = document.getElementById(`body-${contactId}`);
        const updates = { sent: true, sent_at: new Date().toISOString() };
        if (subjEl) updates.draft_subject = subjEl.value;
        if (bodyEl) updates.draft_body = bodyEl.value;

        const { error } = await sb.from('contact_triage').update(updates).eq('id', triageId);
        if (error) { setError(`Mark sent failed: ${error.message}`); return; }
        c.triage_sent = true; c.triage_sent_at = updates.sent_at;
        c.triage_draft_subject = updates.draft_subject || c.triage_draft_subject;
        c.triage_draft_body = updates.draft_body || c.triage_draft_body;
        await sb.from('contacts').update({ status: 'Active' }).eq('id', contactId);
        render();
    }

    async function copyEmail(contactId) {
        const subj = document.getElementById(`subj-${contactId}`)?.value || '';
        const body = document.getElementById(`body-${contactId}`)?.value || '';
        await navigator.clipboard.writeText(`Subject: ${subj}\n\n${body}`);
        flashCopy(contactId);
    }
    async function copyField(contactId, field) {
        const el = document.getElementById(`${field}-${contactId}`);
        if (!el) return;
        await navigator.clipboard.writeText(el.value);
        flashCopy(contactId);
    }
    function flashCopy(contactId) {
        const card = document.getElementById(`card-${contactId}`);
        if (!card) return;
        const flash = document.createElement('div');
        flash.textContent = 'Copied';
        flash.style.cssText = 'position:absolute; background:var(--color-success); color:white; padding:4px 10px; border-radius:4px; font-size:12px; font-weight:600; top:8px; right:8px;';
        card.style.position = 'relative';
        card.appendChild(flash);
        setTimeout(() => flash.remove(), 1200);
    }

    function setError(msg) {
        const el = document.getElementById('error');
        if (!msg) { el.style.display = 'none'; el.textContent = ''; return; }
        el.style.display = 'block'; el.textContent = msg;
    }
    function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function escapeHtmlAttr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }

    loadQueue();
    </script>
</body>
</html>
